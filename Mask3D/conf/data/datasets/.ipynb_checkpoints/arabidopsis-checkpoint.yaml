# @package data
train_dataset:
  _target_: datasets.semseg.SemanticSegmentationDataset
  dataset_name: "arabidopsis"
  data_dir: ${data.data_dir}
  image_augmentations_path: ${data.image_augmentations_path}
  volume_augmentations_path: ${data.volume_augmentations_path}
  label_db_filepath: ${data.data_dir}/label_database.yaml
  color_mean_std: [ [0.5, 0.5, 0.5], [0.5, 0.5, 0.5] ]
  data_percent: 1.0
  mode: ${data.train_mode}
  ignore_label: ${data.ignore_label}
  num_labels: ${data.num_labels}
  add_raw_coordinates: ${data.add_raw_coordinates}
  add_colors: ${data.add_colors}
  add_normals: ${data.add_normals}
  add_instance: ${data.add_instance}
  cache_data: ${data.cache_data}
  cropping: ${data.cropping}
  filter_out_classes: []
  label_offset: 0

validation_dataset:
  _target_: datasets.semseg.SemanticSegmentationDataset
  dataset_name: "arabidopsis"
  data_dir: ${data.data_dir}
  image_augmentations_path: null
  volume_augmentations_path: null
  label_db_filepath: ${data.data_dir}/label_database.yaml
  color_mean_std: [ [0.5, 0.5, 0.5], [0.5, 0.5, 0.5] ]
  data_percent: 1.0
  mode: ${data.validation_mode}
  ignore_label: ${data.ignore_label}
  num_labels: ${data.num_labels}
  add_raw_coordinates: ${data.add_raw_coordinates}
  add_colors: ${data.add_colors}
  add_normals: ${data.add_normals}
  add_instance: ${data.add_instance}
  cache_data: ${data.cache_data}
  cropping: false
  filter_out_classes: []
  label_offset: 0

